<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" rx="16" fill="oklch(0.2 0.02 255)"/>
  <!-- Steering wheel outline -->
  <circle cx="400" cy="150" r="70" fill="none" stroke="oklch(0.55 0.15 255 / 0.25)" stroke-width="3"/>
  <circle cx="400" cy="150" r="20" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <circle cx="400" cy="150" r="10" fill="oklch(0.55 0.15 255 / 0.3)"/>
  <line x1="400" y1="80" x2="400" y2="100" stroke="oklch(0.55 0.15 255 / 0.25)" stroke-width="3"/>
  <line x1="400" y1="200" x2="400" y2="220" stroke="oklch(0.55 0.15 255 / 0.25)" stroke-width="3"/>
  <line x1="330" y1="150" x2="350" y2="150" stroke="oklch(0.55 0.15 255 / 0.25)" stroke-width="3"/>
  <line x1="450" y1="150" x2="470" y2="150" stroke="oklch(0.55 0.15 255 / 0.25)" stroke-width="3"/>
  <line x1="350" y1="100" x2="365" y2="115" stroke="oklch(0.55 0.15 255 / 0.15)" stroke-width="3"/>
  <line x1="435" y1="115" x2="450" y2="100" stroke="oklch(0.55 0.15 255 / 0.15)" stroke-width="3"/>
  <line x1="350" y1="200" x2="365" y2="185" stroke="oklch(0.55 0.15 255 / 0.15)" stroke-width="3"/>
  <line x1="435" y1="185" x2="450" y2="200" stroke="oklch(0.55 0.15 255 / 0.15)" stroke-width="3"/>
  <!-- Steering column -->
  <rect x="395" y="230" width="10" height="60" rx="3" fill="oklch(0.4 0.04 255 / 0.4)"/>
  <circle cx="400" cy="295" r="8" fill="oklch(0.5 0.12 190 / 0.4)"/>
  <!-- Gear connecting steering to potentiometer -->
  <circle cx="400" cy="310" r="12" fill="none" stroke="oklch(0.55 0.15 255 / 0.2)" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="400" cy="325" r="8" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <rect x="395" y="335" width="10" height="25" rx="2" fill="oklch(0.5 0.12 190 / 0.3)"/>
  <!-- Pedals -->
  <rect x="250" y="280" width="50" height="15" rx="4" fill="oklch(0.5 0.12 190 / 0.3)"/>
  <rect x="253" y="295" width="44" height="40" rx="3" fill="oklch(0.4 0.04 255 / 0.3)"/>
  <rect x="320" y="260" width="50" height="15" rx="4" fill="oklch(0.5 0.12 190 / 0.3)"/>
  <rect x="323" y="275" width="44" height="40" rx="3" fill="oklch(0.4 0.04 255 / 0.3)"/>
  <text x="275" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="oklch(0.6 0.05 255)" opacity="0.4">brake</text>
  <text x="345" y="340" text-anchor="middle" font-family="system-ui" font-size="9" fill="oklch(0.6 0.05 255)" opacity="0.4">throttle</text>
  <!-- Arduino board -->
  <rect x="145" y="370" width="100" height="55" rx="6" fill="oklch(0.28 0.04 255 / 0.35)"/>
  <rect x="155" y="378" width="80" height="8" rx="2" fill="oklch(0.55 0.15 255 / 0.2)"/>
  <rect x="155" y="390" width="80" height="8" rx="2" fill="oklch(0.55 0.15 255 / 0.2)"/>
  <circle cx="160" cy="412" r="3" fill="oklch(0.5 0.12 190 / 0.4)"/>
  <circle cx="175" cy="412" r="3" fill="oklch(0.5 0.12 190 / 0.4)"/>
  <circle cx="190" cy="412" r="3" fill="oklch(0.5 0.12 190 / 0.4)"/>
  <text x="195" y="395" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="oklch(0.65 0.05 255)" opacity="0.5">ARDUINO</text>
  <!-- PC -->
  <rect x="545" y="360" width="110" height="70" rx="6" fill="oklch(0.28 0.04 255 / 0.35)"/>
  <rect x="555" y="368" width="90" height="30" rx="3" fill="oklch(0.4 0.04 255 / 0.2)"/>
  <rect x="555" y="404" width="90" height="5" rx="2" fill="oklch(0.4 0.04 255 / 0.15)"/>
  <rect x="555" y="413" width="90" height="5" rx="2" fill="oklch(0.4 0.04 255 / 0.15)"/>
  <text x="600" y="387" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="oklch(0.65 0.05 255)" opacity="0.5">PC + GAME</text>
  <!-- Connection lines Arduino → PC -->
  <line x1="245" y1="395" x2="545" y2="395" stroke="oklch(0.5 0.12 190 / 0.3)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="395" y="388" text-anchor="middle" font-family="system-ui" font-size="8" fill="oklch(0.6 0.05 255)" opacity="0.35">USB serial</text>
  <!-- Dashboard (mobile) -->
  <rect x="620" y="100" width="60" height="100" rx="8" fill="oklch(0.28 0.04 255 / 0.35)"/>
  <rect x="625" y="108" width="50" height="4" rx="2" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <rect x="625" y="117" width="50" height="4" rx="2" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <rect x="625" y="126" width="50" height="4" rx="2" fill="oklch(0.5 0.12 190 / 0.15)"/>
  <circle cx="640" cy="145" r="6" fill="oklch(0.55 0.1 60 / 0.3)"/>
  <circle cx="660" cy="145" r="6" fill="oklch(0.55 0.1 60 / 0.3)"/>
  <rect x="630" y="158" width="40" height="15" rx="3" fill="oklch(0.5 0.12 190 / 0.15)"/>
  <text x="650" y="169" text-anchor="middle" font-family="system-ui" font-size="7" font-weight="600" fill="oklch(0.65 0.05 255)" opacity="0.6">120</text>
  <text x="650" y="190" text-anchor="middle" font-family="system-ui" font-size="7" fill="oklch(0.6 0.05 255)" opacity="0.3">DASHBOARD</text>
  <!-- Connection PC → Dashboard -->
  <line x1="600" y1="365" x2="650" y2="200" stroke="oklch(0.5 0.12 190 / 0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="650" y="350" text-anchor="middle" font-family="system-ui" font-size="7" fill="oklch(0.6 0.05 255)" opacity="0.3">WebSocket</text>
  <!-- Shifter -->
  <rect x="70" y="240" width="45" height="55" rx="6" fill="oklch(0.28 0.04 255 / 0.3)"/>
  <rect x="80" y="248" width="25" height="8" rx="2" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <rect x="80" y="260" width="25" height="8" rx="2" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <rect x="80" y="272" width="25" height="8" rx="2" fill="oklch(0.55 0.15 255 / 0.15)"/>
  <text x="92" y="285" text-anchor="middle" font-family="system-ui" font-size="7" fill="oklch(0.6 0.05 255)" opacity="0.3">H-SHIFTER</text>
  <!-- Dashboard servos -->
  <circle cx="515" cy="150" r="18" fill="none" stroke="oklch(0.55 0.15 255 / 0.2)" stroke-width="2"/>
  <line x1="515" y1="150" x2="528" y2="140" stroke="oklch(0.5 0.12 190 / 0.4)" stroke-width="2"/>
  <circle cx="555" cy="150" r="18" fill="none" stroke="oklch(0.55 0.15 255 / 0.2)" stroke-width="2"/>
  <line x1="555" y1="150" x2="562" y2="137" stroke="oklch(0.5 0.12 190 / 0.4)" stroke-width="2"/>
  <text x="535" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="oklch(0.6 0.05 255)" opacity="0.3">servo gauges</text>
</svg>
