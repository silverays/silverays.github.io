  <style type="text/css">
    .the-header {
    /*   padding-top: 5rem; */
    /*   margin-bottom: 2rem; */
      padding: 5rem 1.5rem;
      height: 300px;
    }

    .the-logo {
      /*max-width: 320px;*/
      /*width: 100%;*/
      /*margin: auto;*/
      width: 300px;
      width: 200px;
    }
    .the-logo svg, .the-logo img {
      width: 100%;
      height: auto;
    }
    .the-logo svg {
      overflow: visible;
    }

    .the-slogan {
      font-size: 18px;
      color: #888;
      margin-top: 15px;
      text-align: center;
    }


    .fg-zetmel-z {
      color: #e30005;
    }
    .fg-zetmel-e {
      color: #9e4ee0;
    }
    .fg-zetmel-t {
      color: #2e73bb;
    }

    .bg-zetmel-z {
      background-color: #e30005 !important;
    }
    .bg-zetmel-e {
      background-color: #9e4ee0 !important;
    }
    .bg-zetmel-t {
      background-color: #2e73bb !important;
    }

    .logo-letter {
      transition: all 300ms;
      transform: translate3d(0, 0, 0);
    }

    .random-letters .zetmel-z {
      transform: translate3d(-20px, 20px, 0);
    }
    .random-letters .zetmel-e1 {
      transform: translate3d(0px, -15px, 0);
    }
    .random-letters .zetmel-t {
      transform: translate3d(10px, 30px, 0);
    }
    .random-letters .zetmel-m {
      transform: translate3d(5px, -5px, 0);
    }
    .random-letters .zetmel-e2 {
      transform: translate3d(5px, 20px, 0);
    }
    .random-letters .zetmel-l {
      transform: translate3d(-5px, -15px, 0);
    }

    .navbar {
      transition: transform 300ms;
      transform: translate3d(0, 0, 0);
    }
    .on-top .navbar {
      transform: translate3d(0, -65px, 0);
    }
    .the-logo-dummy {
/*      width: 300px;
      height: 300px;*/
      opacity: 0.25;
      visibility: hidden;
      margin: auto;
    }
    .the-logo-fixed {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: visible;
      /*width: 300px;*/
      width: 100%;
      height: 100%;
      bottom: auto;
      height: 300px;
      z-index: 5;
/*      height: 300px;*/
      /*z-index: 2;*/
    }
    .the-logo-fixed svg {
      width: 300px;
      width: 200px;
      height: auto;
      transition: all 300ms;
      /*transform: translate3d(calc(50vw - 50%), 80px, 0px);*/
      transform: translate3d(calc(50vw - 50%), 80px, 0px) scale3d(1, 1, 1);
      /*transform: translate3d(calc(50vw - 50%), 80px, 0px) scale3d(0.9, 0.9, 0.9);*/

    }
    .not-on-top .the-logo-fixed svg {
      transform: translate3d(0, 0, 0);
      transform: translate3d(-35px, -30px, 0) scale3d(0.4, 0.4, 1);

      transform-origin: top left;
      /*transform: translate3d(0px, 0px, 0) scale3d(0.5, 0.5, 1);*/
      transform: translate3d(15px, 8px, 0) scale3d(0.5, 0.5, 1);
      /*transform: translate3d(calc(50vw - 50%), 0px, 0) scale3d(0.4, 0.4, 1);*/
    }
    .not-on-top .the-logo-fixed {
      right: auto;
      bottom: auto;
      width: auto;
      height: auto;
      z-index: 2000;
    }
    section {
      position: relative;
      z-index: 3;
    }

    .the-header {
/*      background: url('assets/studio.jpg');
      background-size: cover;*/
    }

body {
}
    .jumbotron {
      background: url(assets/laptop.jpg);
      border-radius: 0;
      color: #FFF;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    .jumbotron::before {
      content: " ";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 3;
      background: rgb(0 0 0 / 70%);
      backdrop-filter: blur(1px);
    }

    .jumbotron h1 {
      font-size: 3rem;
    }

    .jumbotron hr {
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      margin: 0 -15px;
    }

    .jumbotron .container {

      z-index: 4;
      position: relative;
    }
    .navbar {
      background: rgba(255, 255, 255, 0.9) !important;
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
    }

    .brand-owner {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 2000;
      /*padding: 10px 15px;*/
      padding: 13px 15px;
    }
    .reviews-wrapper {
      background: #e9ecef;
    }
    .rating-stars {
      height: 12px;
      width: 68px;
    }
    .rating-stars svg {
      width: 100%;
      height: 100%;
    }

@media (min-width: 576px) {
  .card-columns {
    -webkit-column-count: 2;
    -moz-column-count: 2;
    column-count: 2;
  }
}
